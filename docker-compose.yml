services:
  postgres:
    image: postgres:16
    container_name: bazaar-dps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bazaar
      POSTGRES_PASSWORD: bazaar
      POSTGRES_DB: bazaar_dps
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: